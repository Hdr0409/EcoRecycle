<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="Assets/Logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Settings Page</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <nav
      class="w-full bg-white border-b py-4 px-6 flex items-center gap-3 shadow-sm"
    >
      <div
        onclick="history.back()"
        class="flex items-center gap-2 cursor-pointer"
      >
        <img src="Assets/Back.png" class="w-5 cursor-pointer" />
        <p class="font-medium">Back</p>
      </div>
    </nav>

    <div
      class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow-sm my-6 space-y-8"
    >
      <!-- Akun -->
      <div>
        <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
          <span class="w-2 h-2 bg-green-500 rounded-full"></span> Akun
        </h2>

        <div class="divide-y">
          <!-- Edit Profil -->
          <div
            onclick="window.location.href = 'profile.html'"
            class="py-4 flex justify-between items-center cursor-pointer"
          >
            <div class="flex items-center gap-3">
              <span class="text-xl"></span>
              <div>
                <p class="font-medium">Edit Profil</p>
                <p class="text-sm text-gray-500">Ubah informasi profil Anda</p>
              </div>
            </div>
            <span>›</span>
          </div>

          <!-- Privasi -->
          <div
            onclick="window.location.href = 'prifasi.html'"
            class="py-4 flex justify-between items-center cursor-pointer"
          >
            <div class="flex items-center gap-3">
              <span class="text-xl"></span>
              <div>
                <p class="font-medium">Privasi & Keamanan</p>
                <p class="text-sm text-gray-500">Kelola privasi akun Anda</p>
              </div>
            </div>
            <span>›</span>
          </div>
        </div>
      </div>

      <!-- Notifikasi -->
      <div>
        <h2 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
          <span class="w-2 h-2 bg-green-500 rounded-full"></span> Notifikasi
        </h2>

        <div class="divide-y">
          <!-- Push Notifications -->
          <div class="py-4 flex justify-between items-center">
            <div>
              <p class="font-medium">Push Notifications</p>
              <p class="text-sm text-gray-500">
                Terima notifikasi di perangkat
              </p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="notif-push" class="sr-only peer" />

              <div
                class="w-11 h-6 mb-1 bg-gray-300 rounded-full peer-focus:ring-2 peer-focus:ring-green-300 peer-checked:bg-green-500 relative after:content-[''] after:absolute after:top-1/2 after:-translate-y-1/2 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"
              ></div>
            </label>
          </div>

          <!-- Email -->
          <div class="py-4 flex justify-between items-center">
            <div>
              <p class="font-medium">Email Notifications</p>
              <p class="text-sm text-gray-500">
                Terima pemberitahuan via email
              </p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="notif-email" class="sr-only peer" />

              <div
                class="w-11 h-6 mb-1 bg-gray-300 rounded-full peer-focus:ring-2 peer-focus:ring-green-300 peer-checked:bg-green-500 relative after:content-[''] after:absolute after:top-1/2 after:-translate-y-1/2 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"
              ></div>
            </label>
          </div>

          <!-- Aktivitas Komunitas -->
          <div class="py-4 flex justify-between items-center">
            <div>
              <p class="font-medium">Aktivitas Komunitas</p>
              <p class="text-sm text-gray-500">Notifikasi dari komunitas</p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" class="sr-only peer" />

              <div
                class="w-11 h-6 mb-1 bg-gray-300 rounded-full peer-focus:ring-2 peer-focus:ring-green-300 peer-checked:bg-green-500 relative after:content-[''] after:absolute after:top-1/2 after:-translate-y-1/2 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"
              ></div>
            </label>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

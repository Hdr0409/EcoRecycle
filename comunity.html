<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="Assets/Logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      @keyframes smoothBounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 1;
        }
        50% {
          transform: translateY(-6px);
          opacity: 0.8;
        }
      }

      .smooth-bounce {
        animation: smoothBounce 0.6s ease-in-out infinite;
      }
    </style>
    <title>Comunity</title>
  </head>
  <body
    class="bg-gray-100"
    x-data="{ openAside: false, showLogout: false, openProfile: false }"
  >
    <!-- Loading Popup -->
    <div
      x-data="{ loading: true }"
      x-init="
    window.addEventListener('load', () => {
      setTimeout(() => { loading = false }, 400);
    });
  "
      x-show="loading"
      x-transition.opacity.duration.700ms
      class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-emerald-200 to-emerald-300"
    >
      <!-- Overlay -->
      <div class="absolute inset-0 bg-black/60"></div>

      <!-- Content -->
      <div
        class="relative text-white flex flex-col items-center space-y-4 animate-fadeIn"
      >
        <!-- Logo berputar -->
        <img
          src="Assets/Logo.png"
          class="w-20 h-20 animate-spin-slow drop-shadow-xl"
          alt="Logo"
        />

        <!-- Title -->
        <h1 class="text-3xl font-bold tracking-wide drop-shadow-lg">
          EcoRecycle
        </h1>

        <!-- Subtitle -->
        <p class="text-lg tracking-wide opacity-90">
          Transform Waste Into Worth
        </p>

        <!-- Loading dots -->
        <div class="flex space-x-2 pt-2">
          <div
            class="w-3 h-3 bg-white rounded-full smooth-bounce"
            style="animation-delay: 0s"
          ></div>
          <div
            class="w-3 h-3 bg-white rounded-full smooth-bounce"
            style="animation-delay: 0.15s"
          ></div>
          <div
            class="w-3 h-3 bg-white rounded-full smooth-bounce"
            style="animation-delay: 0.3s"
          ></div>
        </div>
      </div>
    </div>
    <!-- =============== ASIDE (Mobile Slide + Desktop Fixed) =============== -->
    <aside
      class="fixed top-0 left-0 h-full w-64 bg-white shadow-md z-[45] transform transition-all duration-300 -translate-x-full lg:translate-x-0"
      :class="{ '-translate-x-full': !openAside, 'translate-x-0': openAside }"
    >
      <div class="flex items-center justify-between px-5 py-4 border-b h-20">
        <!-- Logo + Title -->
        <div class="flex items-center gap-2">
          <img src="Assets/Logo.png" alt="" class="w-7 h-7" />
          <h2 class="font-semibold text-lg">EcoRecycle</h2>
        </div>

        <!-- Close Button (mobile only) -->
        <button @click="openAside=false" class="lg:hidden text-xl">✕</button>
      </div>

      <!-- Wrapper untuk menu & logout agar logout tetap di bawah -->
      <div
        class="flex flex-col justify-between h-[calc(100%-80px)] py-5 px-6 mt-3"
      >
        <!-- MENU -->
        <nav class="space-y-2">
          <a
            href="dashboard.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-home.png" class="w-4" />
            Dashboard
          </a>

          <a
            href="upload.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-uplod.png" class="w-4" />
            Upload
          </a>

          <a
            href="quizzes.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-quiz.png" class="w-4" />
            Quizzes
          </a>

          <a
            href="calculate.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-calulate.png" class="w-4" />
            Calculate
          </a>

          <a
            href="wastecheck.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-check.png" class="w-4 rounded-sm" />
            WasteCheck
          </a>

          <a
            href="comunity.html"
            class="flex items-center gap-3 text-green-600 font-medium pl-3 bg-green-100 rounded-lg py-2"
          >
            <img src="Assets/D-comunity.png" class="w-4" />
            Community
          </a>

          <a
            href="shop.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-shop.png" class="w-4" />
            Shop
          </a>

          <a
            href="blog.html"
            class="flex items-center gap-3 pl-3 hover:bg-gray-100 rounded-lg py-2"
          >
            <img src="Assets/D-blog.png" class="w-4" />
            Blog
          </a>
        </nav>

        <!-- LOGOUT (selalu di bawah) -->
        <div class="pt-4 mb-6">
          <button
            class="flex items-center gap-3 text-red-500 pl-1"
            @click="showLogout = true ; openAside = false"
          >
            <img src="Assets/D-exit.png" class="w-4" />
            Logout
          </button>
        </div>
      </div>
    </aside>

    <!-- BACKDROP MOBILE -->
    <div
      x-show="openAside"
      @click="openAside=false"
      class="fixed inset-0 bg-black/40 z-40 lg:hidden"
    ></div>

    <!-- ==================== NAVBAR ==================== -->
    <header class="pl-0 lg:pl-64 bg-white border-b sticky top-0 z-30 h-20">
      <div class="flex items-center justify-between px-4 py-3">
        <!-- LEFT (Hamburger + Title) -->
        <div class="flex items-center gap-3">
          <!-- Hamburger (mobile only) -->
          <button @click="openAside=true" class="lg:hidden text-2xl">☰</button>

          <!-- Title -->
          <div>
            <h1 class="text-lg font-semibold">Komunitas</h1>
            <p class="text-xs text-gray-500 -mt-1">Selamat datang kembali!</p>
          </div>
        </div>
        <!-- RIGHT -->
        <div class="flex items-center gap-4 md:mr-10">
          <!-- Notification button -->
          <button
            class="p-2 rounded-full bg-gray-100"
            onclick="window.location.href='notifikasi.html'"
          >
            <img src="Assets/Lonceng.png" class="w-5" />
          </button>

          <!-- PROFILE BUTTON -->
          <button
            @click="openProfile = !openProfile"
            class="flex items-center gap-2 p-2 pr-3 bg-gray-100 rounded-full hover:bg-gray-200 transition"
          >
            <img
              src="Assets/Profil.png"
              class="w-9 h-9 rounded-full"
              id="profilePhoto"
            />

            <div class="hidden md:block text-left">
              <p
                class="text-sm font-semibold leading-tight"
                id="username-1"
              ></p>
              <p class="text-[11px] text-gray-500">
                <span id="level-1"></span> • <span id="poin-1"></span>
              </p>
            </div>
          </button>

          <!-- DROPDOWN -->
          <div
            x-show="openProfile"
            @click.outside="openProfile = false"
            x-transition
            class="absolute right-4 top-full mt-2 w-64 bg-white rounded-xl shadow-[0_8px_30px_rgba(0,0,0,0.08)] p-5 z-50"
          >
            <!-- NAME + EMAIL -->
            <div class="mb-4">
              <p class="text-base font-semibold" id="username-2"></p>
              <p class="text-xs text-gray-500 break-words" id="email"></p>

              <!-- LEVEL & POINTS BOX -->
              <div class="mt-3 flex items-center gap-3">
                <div
                  class="px-3 py-1 rounded-lg text-sm font-medium bg-[#DCFCE7] text-green-700"
                >
                  <span id="level-2"></span>
                </div>
                <div
                  class="px-3 py-1 rounded-lg text-sm font-medium bg-[#FEF9C3] text-yellow-700"
                >
                  <span id="poin-2"></span>
                </div>
              </div>
            </div>

            <hr class="my-3 border-gray-200" />

            <!-- MENU LIST -->
            <ul class="">
              <li
                class="flex items-center gap-3 cursor-pointer hover:text-blue-600 transition hover:bg-gray-100 p-2 rounded-lg"
                onclick="window.location.href='profile.html'"
              >
                <img src="Assets/P-profile.png" alt="" class="w-4" />
                <span><a href="profile.html">Profile Saya</a></span>
              </li>
              <li
                class="flex items-center gap-3 cursor-pointer hover:text-blue-600 transition hover:bg-gray-100 p-2 rounded-lg"
                onclick="window.location.href='settings.html'"
              >
                <img src="Assets/P-settings.png" alt="" class="w-4" />
                <span><a href="settings.html">Pengaturan</a></span>
              </li>
              <li
                class="flex items-center gap-3 cursor-pointer hover:text-blue-600 transition hover:bg-gray-100 p-2 rounded-lg"
                onclick="window.location.href='bantuan.html'"
              >
                <img src="Assets/P-bantuan.png" alt="" class="w-4" />
                <span><a href="bantuan.html">Bantuan</a></span>
              </li>
            </ul>

            <hr class="my-3 border-gray-200" />

            <!-- LOGOUT -->
            <button
              class="w-full text-left flex items-center gap-3 text-red-500 hover:text-red-600 transition p-2"
              @click="showLogout = true ; openProfile = false"
            >
              <img src="Assets/D-exit.png" alt="" class="w-4" /> Logout
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="md:p-10 pl-0 lg:pl-64">
      <!-- SECTION -->
      <section class="py-10 px-4 md:px-0" x-data="communityApp()">
        <div class="max-w-4xl mx-auto flex justify-between items-start mb-10">
          <div class="w-1/2">
            <h1 class="text-3xl md:text-5xl font-bold mb-5">Community</h1>
            <p class="text-gray-500 md:text-base text-xs">
              Connect and share with fellow eco-warriors 🌿
            </p>
          </div>
          <button
            @click="showForm = true"
            class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 mt-auto md:text-base text-sm"
          >
            + New Post
          </button>
        </div>

        <!-- FORM -->
        <div x-show="showForm" x-transition class="max-w-4xl mx-auto mb-6">
          <form @submit="addPost" class="bg-white rounded-xl p-6 shadow">
            <div class="flex items-center gap-3 mb-4">
              <img src="Assets/PP.png" class="w-10 h-10 rounded-full" />
              <div>
                <h1 class="font-semibold">Create New Post 🌟</h1>
                <p class="text-gray-500 text-sm" id="username-3"></p>
              </div>
              <!-- TOMBOL X -->
              <button
                type="button"
                @click="showForm = false"
                class="left-4 top-4 text-gray-500 hover:text-black text-xl font-bold ml-auto"
              >
                ✕
              </button>
            </div>

            <label class="block mb-1 text-sm font-medium">Category</label>
            <select
              name="category"
              class="w-full border rounded-lg px-3 py-2 mb-4"
            >
              <option>Discussion</option>
              <option>Achievement</option>
              <option>Question</option>
              <option>Fun Fact</option>
            </select>

            <label class="block mb-1 text-sm font-medium">Title</label>
            <input
              name="title"
              type="text"
              class="w-full border rounded-lg px-3 py-2 mb-4"
              maxlength="50"
              required
            />

            <label class="block mb-1 text-sm font-medium">Content</label>
            <textarea
              name="message"
              rows="4"
              class="w-full border rounded-lg px-3 py-2 mb-4"
              maxlength="500"
              required
            ></textarea>

            <label class="block mb-1 text-sm font-medium"
              >Attach Image (optional)</label
            >
            <input name="uploadImg" type="file" accept="image/*" class="mb-4" />

            <button
              type="submit"
              class="w-full bg-emerald-600 text-white py-2 rounded-lg hover:bg-emerald-700"
              onclick="postBtn()"
            >
              Post in Community
            </button>
          </form>
        </div>

        <!-- POSTS -->
        <div class="max-w-4xl mx-auto space-y-6">
          <template x-for="(post, index) in posts" :key="index">
            <div class="bg-white rounded-xl p-5 shadow-md">
              <div class="flex items-start gap-3 mb-3">
                <!-- FOTO PROFILE -->
                <img
                  x-show="post.ppimage"
                  :src="post.ppimage"
                  class="w-auto md:h-14 h-12 rounded-full"
                />

                <!-- NAMA + LEVEL + CATEGORY -->
                <div class="flex-1 ml-5">
                  <!-- NAMA + LEVEL (1 baris) -->
                  <div class="flex items-center gap-2">
                    <h1
                      class="font-bold text-lg md:text-xl mr-2 mb-1"
                      x-text="post.name"
                    ></h1>
                    <p
                      class="text-xs md:text-sm text-white font-semibold bg-emerald-500 px-2 py-1 rounded-md"
                    >
                      Level <span x-text="post.level"></span>
                    </p>
                  </div>

                  <!-- CATEGORY (baris kedua) -->
                  <span
                    class="mt-1 inline-block px-2 py-1 bg-yellow-100 text-yellow-700 text-xs md:text-sm font-medium rounded"
                    x-text="post.category"
                  >
                  </span>
                </div>

                <div class="flex-box">
                  <!-- WAKTU -->
                  <p
                    class="text-gray-400 text-sm ml-auto"
                    x-text="post.time"
                  ></p>
                  <button
                    x-show="post.owner === (getUserData().email ?? 'guest')"
                    @click="deletePost(index)"
                    class="ml-5 text-red-500 text-sm hover:text-red-700"
                  >
                    Hapus
                  </button>
                </div>
              </div>
              <hr />
              <h2
                class="font-bold text-lg md:text-xl mb-4 mt-5 break-words"
                x-text="post.title"
              ></h2>

              <img
                x-show="post.image"
                :src="post.image"
                class="rounded-lg mb-3 h-1/2 w-1/2 object-contain"
              />

              <p
                class="text-gray-700 mb-3 text-sm md:text-base break-words"
                x-text="post.message"
              ></p>
            </div>
          </template>
        </div>
      </section>
      <script src="js/data.js"></script>
      <script src="js/comunity.js"></script>
    </main>
  </body>
</html>

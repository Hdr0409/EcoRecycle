<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="Assets/Logo.png" />

    <title>User Profile</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#F9FAFB]">
    <!-- NAVBAR -->
    <nav
      class="w-full bg-white border-b py-4 px-6 flex items-center gap-3 shadow-sm"
    >
      <div
        onclick="history.back()"
        class="flex items-center gap-2 cursor-pointer"
      >
        <img src="Assets/Back.png" class="w-5 cursor-pointer" />
        <p class="font-medium">Back</p>
      </div>
    </nav>

    <!-- MAIN CONTENT -->

    <section class="max-w-4xl mx-auto mt-10 px-4" x-data="faqSection()">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-5 mb-8">
        <!-- ITEM 1 -->
        <div class="bg-white rounded-2xl shadow p-6 flex flex-col items-center">
          <div
            class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center"
          >
            <img src="Assets/B-1.png" class="w-7 h-7" />
          </div>
          <p class="mt-3 font-medium text-gray-700">Memulai</p>
        </div>

        <!-- ITEM 2 -->
        <div class="bg-white rounded-2xl shadow p-6 flex flex-col items-center">
          <div
            class="w-14 h-14 rounded-full bg-yellow-100 flex items-center justify-center"
          >
            <img src="Assets/B-2.png" class="w-7 h-7" />
          </div>
          <p class="mt-3 font-medium text-gray-700">Poin</p>
        </div>

        <!-- ITEM 3 -->
        <div class="bg-white rounded-2xl shadow p-6 flex flex-col items-center">
          <div
            class="w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center"
          >
            <img src="Assets/B-3.png" class="w-7 h-7" />
          </div>
          <p class="mt-3 font-medium text-gray-700">Shop</p>
        </div>

        <!-- ITEM 4 -->
        <div class="bg-white rounded-2xl shadow p-6 flex flex-col items-center">
          <div
            class="w-14 h-14 rounded-full bg-purple-100 flex items-center justify-center"
          >
            <img src="Assets/B-4.png" class="w-7 h-7" />
          </div>
          <p class="mt-3 font-medium text-gray-700">Komunitas</p>
        </div>
      </div>

      <!-- ACCORDION ITEM TEMPLATE -->
      <template x-for="(item, i) in faqItems" :key="i">
        <div class="rounded-xl shadow mb-10 border overflow-hidden">
          <!-- ACCORDION HEADER -->
          <button
            @click="open === i ? open = null : open = i"
            class="w-full flex items-center justify-between px-5 py-4 text-left font-semibold"
            :class="item.bg"
          >
            <div class="flex items-center gap-3">
              <img :src="item.icon" class="w-6 h-6" />
              <span x-text="item.title"></span>
            </div>

            <svg
              class="w-5 h-5 transform transition-all"
              :class="open === i ? 'rotate-180' : ''"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </button>

          <!-- ACCORDION CONTENT -->
          <div x-show="open === i" x-collapse>
            <div class="px-5 py-4 bg-white text-gray-700 leading-relaxed">
              <h3 class="font-semibold mb-2" x-text="item.subtitle"></h3>
              <p x-text="item.desc"></p>
            </div>
          </div>
        </div>
      </template>
      <!-- NEED MORE HELP -->
      <div class="bg-white rounded-2xl p-6 shadow mb-6">
        <div class="flex items-center gap-2 mb-5">
          <img src="Assets/B-help.png" class="w-6 h-6 opacity-70" />
          <h3 class="text-xl font-semibold text-gray-800">Need More Help?</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- EMAIL -->
          <div class="bg-green-50 rounded-xl p-5 flex items-start gap-4">
            <div class="bg-white p-3 rounded-xl shadow">
              <img src="Assets/email.png" class="w-6 h-6" />
            </div>
            <div>
              <p class="font-semibold text-gray-900">Email Us</p>
              <p class="text-sm text-green-700">support@recycleworld.com</p>
            </div>
          </div>

          <!-- PHONE -->
          <div class="bg-green-50 rounded-xl p-5 flex items-start gap-4">
            <div class="bg-white p-3 rounded-xl shadow">
              <img src="Assets/Telfon.png" class="w-6 h-6" />
            </div>
            <div>
              <p class="font-semibold text-gray-900">Call Us</p>
              <p class="text-sm text-green-700">+62 893-940-830</p>
            </div>
          </div>
        </div>
      </div>
      <!-- SUGGESTIONS -->
      <div
        class="bg-yellow-50 border border-yellow-300 rounded-xl p-5 flex justify-between items-center mb-10"
      >
        <div class="flex items-start gap-4">
          <div>
            <p class="font-semibold text-gray-900 text-sm md:text-lg text">Punya saran?</p>
            <p class="text-xs md:text-sm text-gray-600 mr-2 mt-2 md:mr-0 md:mt-0">
              Kami ingin mendengar pendapat Anda untuk meningkatkan EcoRecycle
            </p>
          </div>
        </div>

        <button
          class="bg-yellow-600 hover:bg-yellow-700 text-white px-5 py-2 rounded-lg font-normal md:font-medium shadow text-xs md:mt-0 mt-4 md:text-base"
        >
          Send Feedback
        </button>
      </div>
    </section>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("faqSection", () => ({
          open: null,
          faqItems: [
            {
              title: "Apa itu EcoRecycle",
              subtitle: "Apa itu EcoRecycle?",
              desc: "Ecorecycle adalah sebuah inisiatif ramah lingkungan yang berfokus pada menciptakan solusi berkelanjutan untuk kehidupan sehari-hari.",
              icon: "Assets/B-1.png",
              bg: "bg-green-100",
            },
            {
              title: "Cara mendapatkan poin",
              subtitle: "Bagaimana cara mendapatkan poin?",
              desc: "Kalian bisa melihat info di bagian Home dashboard, di sana sudah dibuatkan petunjuk tips cara mendapatkan poin.",
              icon: "Assets/B-2.png",
              bg: "bg-yellow-100",
            },
            {
              title: "Cara berbelanja merchandise",
              subtitle: "Bagaimana cara berbelanja merchandise?",
              desc: "Pada halaman Shop, kamu bisa menemukan berbagai merchandise yang tersedia dan bisa ditukar dengan poin.",
              icon: "Assets/B-3.png",
              bg: "bg-blue-100",
            },
            {
              title: "Bagaimana cara bergabung dengan komunitas",
              subtitle: "Bagaimana cara bergabung dengan komunitas?",
              desc: "Anda dapat bergabung dengan membuat akun EcoRecycle terlebih dahulu lalu masuk ke halaman Community.",
              icon: "Assets/B-4.png",
              bg: "bg-purple-100",
            },
          ],
        }));
      });
    </script>
  </body>
</html>

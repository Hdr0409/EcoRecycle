<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="Assets/Logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>
    <title>Edit Profil</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100" x-data="editProfile">
    <!-- NAVBAR -->
    <nav
      class="w-full bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm"
    >
      <!-- LEFT -->
      <div
        class="flex items-center gap-3 cursor-pointer"
        onclick="history.back()"
      >
        <img src="Assets/Back.png" class="w-5" />
        <div>
          <h1 class="text-lg font-semibold">Edit Profil</h1>
          <p class="text-sm text-gray-500 -mt-1">Perbarui informasi Anda</p>
        </div>
      </div>

      <!-- RIGHT -->
      <button
        class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-full font-medium"
        onclick="saveChanges()"
      >
        Simpan
      </button>
    </nav>

    <!-- MAIN CONTENT -->
    <section
      class="max-w-2xl mx-auto mt-10 rounded-xl overflow-hidden px-4 mb-10"
    >
      <div class="bg-white rounded-xl">
        <!-- COVER / BANNER -->
        <div class="relative">
          <img
            :src="bannerPreview || 'Assets/Banner.png'"
            class="w-full h-48 object-cover rounded-t-xl object-top"
          />

          <!-- Button Ubah Banner -->
          <label
            class="absolute bottom-4 right-4 bg-white shadow px-4 py-2 rounded-full flex items-center gap-2 cursor-pointer block w-max cursor-pointe"
          >
            <span class="text-sm">Ubah Cover</span>
            <input
              type="file"
              accept="image/*"
              class="absolute inset-0 opacity-0 cursor-pointer z-10"
              @change="updateBanner"
            />
          </label>
        </div>

        <!-- PROFILE PHOTO -->
        <div class="relative px-8 -mt-12">
          <label class="relative block w-max cursor-pointer">
            <img
              :src="photoPreview || 'Assets/PP.png'"
              class="w-28 h-28 rounded-full shadow-lg object-cover"
            />

            <div
              class="absolute bottom-1 right-1 bg-emerald-500 p-2 rounded-full shadow"
            >
              <img src="Assets/E-photo.png" class="w-4" />
            </div>

            <input
              type="file"
              accept="image/*"
              class="hidden"
              @change="updatePhoto"
            />
          </label>
        </div>

        <!-- FORM -->
        <div class="px-8 pt-6 pb-10 space-y-6">
          <!-- NAMA LENGKAP -->
          <div>
            <label class="font-medium"
              >Nama Lengkap <span class="text-red-500">*</span></label
            >
            <input
              type="text"
              class="mt-1 w-full border rounded-lg px-4 py-2 focus:ring-emerald-500 focus:border-emerald-500"
              placeholder="Nama Lengkap"
              id="nameInput"
              maxlength="10"
            />
          </div>
          <div>
            <label class="font-medium"
              >Email <span class="text-red-500">*</span></label
            >
            <input
              class="mt-1 w-full border rounded-lg px-4 py-2 focus:ring-emerald-500 focus:border-emerald-500"
              id="emailInput"
              type="email"
              placeholder="contoh: nama@gmail.com"
              maxlength=""
            />
          </div>

          <!-- BIO -->
          <div>
            <label class="font-medium">Bio</label>
            <textarea
              id="bioInput"
              class="mt-1 w-full border rounded-lg px-4 py-2 h-28 focus:ring-emerald-500 focus:border-emerald-500"
              placeholder="Tulis bio Anda..."
            ></textarea>
          </div>

          <!-- BUTTONS -->
          <div class="flex juctify-center md:justify-end gap-3 pt-4">
            <button
              class="px-6 py-2 rounded-lg border text-gray-600 hover:bg-gray-100"
              onclick="history.back()"
            >
              Batal
            </button>

            <button
              class="px-6 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium"
              onclick="saveChanges()"
            >
              Simpan
            </button>
          </div>
        </div>
      </div>
    </section>
    <script src="data.js"></script>
    <!-- ALPINE.JS LOGIC -->
    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("editProfile", () => ({
          bannerPreview: null,
          photoPreview: null,

          init() {
            const user = getUserData();
            this.bannerPreview = user.banner || null;
            this.photoPreview = user.photo || null;
          },

          updateBanner(e) {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = () => {
                this.bannerPreview = reader.result;
                updateUserData({ banner: reader.result }); // SIMPAN!!
              };
              reader.readAsDataURL(file);
            }
          },

          updatePhoto(e) {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = () => {
                this.photoPreview = reader.result;
                updateUserData({ photo: reader.result }); // SIMPAN!!
              };
              reader.readAsDataURL(file);
            }
          },
        }));
      });
      const user = getUserData();

      function saveChanges() {
        const bio = bioInput.value.trim();
        const newName = nameInput.value.trim();
        const email = emailInput.value.trim();

        if (bio === "") {
          alert("Bio tidak boleh kosong!");
          return;
        }
        if (newName === "") {
          alert("Nama tidak boleh kosong!");
          return;
        }
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
          alert("Email tidak valid!");
          return;
        }

        const currentUser = getUserData();

        updateUserData({
          bio,
          name: newName,
          email,
          banner: currentUser.banner || null,
          photo: currentUser.photo || null,
        });

        alert("Data berhasil disimpan!");
        window.location.href = "dashboard.html";
      }
      nameInput.addEventListener("input", function () {
        this.value = this.value.replace(/[^a-zA-Z ]/g, ""); // hanya huruf + spasi
      });
      emailInput.value = user.email || "";
      nameInput.value = user.name || "";
      bioInput.value = user.bio || "";
    </script>
  </body>
</html>
